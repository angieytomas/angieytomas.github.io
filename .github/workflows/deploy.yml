name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: june2026/package-lock.json

      - name: Install dependencies
        working-directory: june2026
        run: npm ci

      - name: Setup Pages
        id: setup_pages
        uses: actions/configure-pages@v5

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: june2026/.next/cache
          key: ${{ runner.os }}-nextjs-june2026-${{ hashFiles('june2026/package-lock.json') }}-${{ hashFiles('june2026/app/**/*.[jt]s', 'june2026/app/**/*.[jt]sx', 'june2026/components/**/*.[jt]s', 'june2026/components/**/*.[jt]sx', 'june2026/content/**/*.[jt]s', 'june2026/content/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-june2026-${{ hashFiles('june2026/package-lock.json') }}-

      - name: Build with Next.js
        working-directory: june2026
        run: npm run build
        env:
          PAGES_BASE_PATH: ${{ steps.setup_pages.outputs.base_path }}

      - name: Remove custom domain file unless explicitly configured
        if: ${{ vars.CUSTOM_DOMAIN == '' }}
        run: rm -f june2026/out/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./june2026/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
